name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: main
        type: choice
        options:
          - main
          - dev
      ref:
        description: "Optional git ref (branch/tag/SHA) for selected target"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Resolve target and ref
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BRANCH: ${{ github.ref_name }}
          PUSH_SHA: ${{ github.sha }}
          MANUAL_TARGET: ${{ github.event.inputs.target }}
          MANUAL_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ "${EVENT_NAME}" = "push" ]; then
            target="${PUSH_BRANCH}"
            ref="${PUSH_SHA}"
          else
            target="${MANUAL_TARGET}"
            if [ -n "${MANUAL_REF}" ]; then
              ref="${MANUAL_REF}"
            else
              ref="origin/${target}"
            fi
          fi

          if [ "${target}" = "main" ]; then
            base_path="/"
            site_path="_site"
          elif [ "${target}" = "dev" ]; then
            base_path="/dev/"
            site_path="_site/dev"
          else
            echo "Unsupported target: ${target}" >&2
            exit 1
          fi

          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "base=${base_path}" >> "${GITHUB_OUTPUT}"
          echo "site_path=${site_path}" >> "${GITHUB_OUTPUT}"

      - name: Fetch deploy refs
        env:
          TARGET: ${{ steps.target.outputs.target }}
          REF: ${{ steps.target.outputs.ref }}
        run: |
          git fetch origin main dev
          if [ "${TARGET}" = "main" ] || [ "${TARGET}" = "dev" ]; then
            if [ "${REF}" != "origin/${TARGET}" ]; then
              git fetch origin "${REF}" || true
            fi
          fi

      - name: Build selected target
        run: |
          git worktree add ../site-build "${{ steps.target.outputs.ref }}"
          cd ../site-build
          pnpm install --frozen-lockfile
          pnpm run build
        env:
          VITE_BASE_PATH: ${{ steps.target.outputs.base }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_API_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_API_HOST }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_HOST }}

      - name: Restore existing site state
        run: |
          mkdir -p _site
          if git ls-remote --exit-code --heads origin pages-state >/dev/null 2>&1; then
            git fetch origin pages-state
            git worktree add ../site-state origin/pages-state
            cp -R ../site-state/. _site/
          fi
          touch _site/.nojekyll

      - name: Merge selected target into site
        env:
          TARGET: ${{ steps.target.outputs.target }}
          SITE_PATH: ${{ steps.target.outputs.site_path }}
        run: |
          if [ "${TARGET}" = "main" ]; then
            find _site -mindepth 1 -maxdepth 1 ! -name dev ! -name CNAME -exec rm -rf {} +
            cp -R ../site-build/dist/. _site/
          else
            rm -rf "${SITE_PATH}"
            mkdir -p "${SITE_PATH}"
            cp -R ../site-build/dist/. "${SITE_PATH}/"
          fi
          touch _site/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Persist merged state branch
        env:
          TARGET: ${{ steps.target.outputs.target }}
          REF: ${{ steps.target.outputs.ref }}
        run: |
          git worktree remove --force ../site-state >/dev/null 2>&1 || true
          if git ls-remote --exit-code --heads origin pages-state >/dev/null 2>&1; then
            git fetch origin pages-state
            git worktree add ../site-state origin/pages-state
          else
            git worktree add --detach ../site-state
            cd ../site-state
            git switch --orphan pages-state
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cd -
          fi

          find ../site-state -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R _site/. ../site-state/

          cd ../site-state
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes in pages-state."
            exit 0
          fi
          git commit -m "pages-state: ${TARGET} (${REF})"
          git push origin HEAD:pages-state
