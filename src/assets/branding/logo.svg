<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            svg {
            --primary: 219 64% 14%;
            --primary-foreground: 38 94% 89%;
            --border-radius: 27px;
            }
        </style>
    </defs>
    <rect id="background" width="100%" height="100%" rx="var(--border-radius)"
        fill="hsl(var(--primary))"></rect>
    <text id="text" x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
        fill="hsl(var(--primary-foreground))" font-family="'Bricolage Grotesque', 'Avenir Next', 'Segoe UI', sans-serif"
        font-weight="800" font-size="88" letter-spacing="-0.02em">P8</text>
</svg>
